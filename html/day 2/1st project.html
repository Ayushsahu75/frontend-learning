<html>
<body>

<h2>Unordered List</h2>

<ul id="myList"></ul>

<script>

let ul = document.getElementById("myList");

for(let i = 1; i <= 10; i++){
    let li = document.createElement("li");
    let letter = String.fromCharCode(96 + i);
    li.textContent = letter + ". " + i;
    ul.appendChild(li);
}

</script>

</body>
</html>
