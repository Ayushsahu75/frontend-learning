<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <form action="url ">
        <!-- action url- mtlb form backend me kaha jayega -->
        <fieldset>
        <legend>IIT JEE registration form</legend>
        <label for="name">full name-</label>
        <input type="name" id="name" name="fname">
        <br><br>
        <label for="email">email-</label>
        <input type="email" id="email" name="id">
        <br><br> 
        <label for="number">number-</label>
        <input type="number" id="number" name="num">
        <br><br> 
        <label for="passward" >passward-</label>
        <input type="password" id="passward" name="gender" value="male">
        <br><br> 
       <label for="gender">gender-</label>
       <input type="checkbox" id="male" name="gender" value="female">
       <label for="male">male</label>
       <input type="checkbox" id="male" name="femail">
       <label for="male">female</label>
        <br><br>
        <label for="date">Date of birth-</label>
    <input type="date" id="date" name="DPB" min="2001-01-01" max="2005-01-31">
   <br><br>
   <label for="school name">school name-</label>
   <input type="school name" id="school name" name="school name">
<br><br>
<label for="board">board-</label>
<select name="board" id="board">
    <option value="" disabled selected>select your board </option>
    <option value="mp">mp board</option>
    <option value="up "> up board</option>
    <option value="cbsc">CBSC board</option>
    

</select>
<br><br>
<label for="year">year of passing-</label>
<input type="number" id="year" name="year" min="2020" max="2025">
<br><br>
<label for="center"> exam center-</label>
<select name="center" id="center">
    <option value=""disabled selected> choosr your center</option>
    <option value="bhopal">bhopal</option>
    <option value="narshing pur">narshing pur</option>
    <option value="jabalpur">jabalpur</option>
    <option value="indore">indore</option>
</select>
<br><br>
<button>submit</button>

</fieldset>


</form>
</body>
</html>
