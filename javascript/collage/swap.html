<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swap two numbers</title>
</head>
<body>
    <p>Enter first element</p>
    <input type="text" , id="num1"> <br><br>

    <p>Enter second element</p>
    <input type="text", id="num2"> <br><br>
    
    <button onclick="swap()">swap</button><br><br>
    <p id="result"></p>

    <script>
        function swap(){
            let first = document.getElementById("num1").value;
            let second = document.getElementById("num2").value;
            let temp =  first ;
            first = second;
            second  = temp;
            document.getElementById("result").innerHTML = first + second ;            
        }
    </script>
</body>
</html>
